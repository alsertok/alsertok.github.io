<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода в Ухте</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', Arial, sans-serif;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 40%, #94a3b8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            text-align: center;
            background: #e2e8f0;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            padding: 18px 5px 10px;
            max-width: 100%;
            width: 100%;
            margin: 8px;
            border: 1px solid #cbd5e1;
            box-sizing: border-box;
        }
        
        h1 { margin: 2px 0 5px 0; font-size: 29px; font-weight: 700; color: #0f172a; }
        .subtitle { font-size: 15.5px; color: #475569; margin: 0 0 12px 0; }
        
        .widget-wrapper {
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            margin: 8px 0 5px 0;
            background: #f8fafc;
            padding: 6px 2px 2px;
        }
        
        iframe {
            display: block;
            margin: 0 auto;
            width: 100% !important;
            height: 440px;           /* уменьшил высоту */
            border: 0;
        }
        
        .footer {
            font-size: 13.5px;
            color: #64748b;
            margin-top: 4px;
        }
        
        .footer a { color: #3b82f6; text-decoration: none; }
        
        @media (min-width: 520px) {
            .container { max-width: 520px; padding: 30px 25px 16px; }
            iframe { height: 430px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Погода в Ухте</h1>
        <p class="subtitle">Прогноз на 7 дней</p>
      
        <div class="widget-wrapper">
            <iframe
                src="https://www.meteoblue.com/ru/погода/widget/daily/Ухта_Россия_479411?geoloc=fixed&tempunit=CELSIUS&windunit=METER_PER_SECOND&precipunit=MILLIMETER&days=7&coloured=coloured&pictoicon=1&maxtemperature=1&mintemperature=1&windspeed=1&windgust=1&winddirection=1&uv=0&humidity=0&precipitation=1&precipitationprobability=1&spot=1&pressure=0&layout=light&user_key=4ca9df6daa0f2812&embed_key=da9573987d5f4b9c&sig=2ed508d46e1fb957ad4abd416c7fd464d9912d39ac4411e542089903c283720f"
                frameborder="0"
                scrolling="NO"
                allowtransparency="true"
                sandbox="allow-same-origin allow-scripts allow-popups allow-popups-to-escape-sandbox">
            </iframe>
        </div>
        
        <div class="footer">
            Данные предоставлены 
            <a href="https://www.meteoblue.com/ru/погода/неделя/index" target="_blank" rel="noopener">meteoblue</a>

</body>
</html>
