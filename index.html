<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Погода в Ухте — meteoblue</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        body {
            margin: 0;
            padding: 20px 0;
            font-family: 'Roboto', Arial, sans-serif;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 40%, #94a3b8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1e2937;
        }
        
        .container {
            text-align: center;
            background: #e2e8f0;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            padding: 30px 20px;
            max-width: 440px;           /* ← ограничиваем ширину на компьютере */
            width: 100%;
            margin: 0 auto;
            border: 1px solid #cbd5e1;
        }
        
        h1 {
            margin: 0 0 10px 0;
            font-size: 29px;
            font-weight: 700;
            color: #0f172a;
        }
        
        .subtitle {
            font-size: 16px;
            color: #475569;
            margin-bottom: 25px;
        }
        
        .widget-wrapper {
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            margin-bottom: 25px;
            background: #f8fafc;
            padding: 15px 10px;
        }
        
        /* Масштабирование виджета */
        .scale-wrapper {
            width: 378px;
            height: 393px;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 12px;
        }
        
        .scale-wrapper iframe {
            width: 378px;
            height: 393px;
            border: 0;
            transform-origin: top left;
        }
        
        /* Для телефонов (включая OnePlus 15) */
        @media (max-width: 480px) {
            .container {
                max-width: 100%;
                padding: 20px 12px;
                margin: 8px;
                border-radius: 20px;
            }
            
            h1 {
                font-size: 26px;
            }
            
            .scale-wrapper {
                width: 305px;
                height: 317px;
            }
            
            .scale-wrapper iframe {
                transform: scale(0.78);   /* можно попробовать 0.76 или 0.80 */
            }
        }
        
        .footer {
            font-size: 14px;
            color: #64748b;
        }
        
        .footer a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Погода в Ухте</h1>
        <p class="subtitle">Прогноз на 7 дней</p>
      
        <div class="widget-wrapper">
            <div class="scale-wrapper">
                <iframe
                    src="https://www.meteoblue.com/ru/погода/widget/daily/Ухта_Россия_479411?geoloc=fixed&tempunit=CELSIUS&windunit=METER_PER_SECOND&precipunit=MILLIMETER&days=7&coloured=coloured&pictoicon=1&maxtemperature=1&mintemperature=1&windspeed=1&windgust=1&winddirection=1&uv=0&humidity=0&precipitation=1&precipitationprobability=1&spot=1&pressure=0&layout=light&user_key=4ca9df6daa0f2812&embed_key=da9573987d5f4b9c&sig=2ed508d46e1fb957ad4abd416c7fd464d9912d39ac4411e542089903c283720f"
                    frameborder="0"
                    scrolling="NO"
                    allowtransparency="true"
                    sandbox="allow-same-origin allow-scripts allow-popups allow-popups-to-escape-sandbox">
                </iframe>
            </div>
        </div>
        
        <div class="footer">
            Данные предоставлены 
            <a href="https://www.meteoblue.com/ru/погода/неделя/index" target="_blank" rel="noopener">meteoblue</a>
        </div>
    </div>
</body>
</html>
