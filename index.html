<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода в Ухте</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', Arial, sans-serif;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 40%, #94a3b8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1e2937;
        }
        
        .container {
            text-align: center;
            background: #e2e8f0;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            padding: 35px 15px;           /* меньше отступов по бокам на телефоне */
            max-width: 100%;              /* на телефоне — во всю ширину */
            width: 100%;
            margin: 15px;
            border: 1px solid #cbd5e1;
            box-sizing: border-box;
        }
        
        h1 {
            margin: 0 0 8px 0;
            font-size: 31px;
            font-weight: 700;
            color: #0f172a;
        }
        
        .subtitle {
            font-size: 16.5px;
            color: #475569;
            margin-bottom: 25px;
        }
        
        .widget-wrapper {
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            margin-bottom: 25px;
            background: #f8fafc;
            padding: 18px 8px 10px;
        }
        
        iframe {
            display: block;
            margin: 0 auto;
            width: 100%;                  /* главное изменение — 100% ширины */
            max-width: none;              /* убираем ограничение */
            height: 420px;                /* чуть увеличил высоту, чтобы всё влезло */
            border: 0;
        }
        
        .footer {
            font-size: 14.5px;
            color: #64748b;
        }
        
        .footer a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }

        /* На больших экранах (компьютер) оставляем разумную ширину */
        @media (min-width: 520px) {
            .container {
                max-width: 520px;
                padding: 40px 25px;
                margin: 30px;
            }
            iframe {
                max-width: 480px;
                height: 410px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Погода в Ухте</h1>
        <p class="subtitle">Прогноз на 7 дней</p>
      
        <div class="widget-wrapper">
            <iframe
                src="https://www.meteoblue.com/ru/погода/widget/daily/Ухта_Россия_479411?geoloc=fixed&tempunit=CELSIUS&windunit=METER_PER_SECOND&precipunit=MILLIMETER&days=7&coloured=coloured&pictoicon=1&maxtemperature=1&mintemperature=1&windspeed=1&windgust=1&winddirection=1&uv=0&humidity=0&precipitation=1&precipitationprobability=1&spot=1&pressure=0&layout=light&user_key=4ca9df6daa0f2812&embed_key=da9573987d5f4b9c&sig=2ed508d46e1fb957ad4abd416c7fd464d9912d39ac4411e542089903c283720f"
                frameborder="0"
                scrolling="NO"
                allowtransparency="true"
                sandbox="allow-same-origin allow-scripts allow-popups allow-popups-to-escape-sandbox">
            </iframe>
        </div>
        
        <div class="footer">
            Данные предоставлены 
            <a href="https://www.meteoblue.com/ru/погода/неделя/index" 
               target="_blank" 
               rel="noopener">
               meteoblue
            </a>
        </div>
    </div>
</body>
</html>
