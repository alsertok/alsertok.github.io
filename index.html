<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Погода в Ухте</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', Arial, sans-serif;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 40%, #94a3b8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1e2937;
        }
        
        .container {
            text-align: center;
            background: #e2e8f0;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            padding: 20px 15px;
            max-width: 360px;           /* сильно уменьшено для телефона */
            width: 100%;
            margin: 10px;
            border: 1px solid #cbd5e1;
        }
        
        h1 {
            margin: 0 0 8px 0;
            font-size: 26px;
            font-weight: 700;
            color: #0f172a;
        }
        
        .subtitle {
            font-size: 15px;
            color: #475569;
            margin-bottom: 20px;
        }
        
        .widget-wrapper {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
            margin-bottom: 20px;
            background: #f8fafc;
            padding: 12px 8px 8px;
        }
        
        .iframe-container {
            position: relative;
            width: 100%;
            padding-top: 110%;           /* пропорция под уменьшенный размер */
            overflow: hidden;
            border-radius: 12px;
        }
        
        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        
        .footer {
            font-size: 13.5px;
            color: #64748b;
        }
        
        .footer a {
            color: #3b82f6;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Погода в Ухте</h1>
        <p class="subtitle">Прогноз на 7 дней</p>
      
        <div class="widget-wrapper">
            <div class="iframe-container">
                <iframe
                    src="https://www.meteoblue.com/ru/погода/widget/daily/Ухта_Россия_479411?geoloc=fixed&tempunit=CELSIUS&windunit=METER_PER_SECOND&precipunit=MILLIMETER&days=7&coloured=coloured&pictoicon=1&maxtemperature=1&mintemperature=1&windspeed=1&windgust=1&winddirection=1&uv=0&humidity=0&precipitation=1&precipitationprobability=1&spot=1&pressure=0&layout=light&user_key=4ca9df6daa0f2812&embed_key=da9573987d5f4b9c&sig=2ed508d46e1fb957ad4abd416c7fd464d9912d39ac4411e542089903c283720f"

</body>
</html>
